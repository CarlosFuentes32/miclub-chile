databases:
  - name: miclub-db
    databaseName: miclub
    user: miclub

services:
  - type: web
    name: miclub-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    preDeployCommand: npm run prisma:migrate:deploy && npm run prisma:seed
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: miclub-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN_DAYS
        value: 7
      - key: SEED_PASSWORD
        sync: false
      - key: SEED_ADMIN_EMAIL
        value: admin@miclub.local
      - key: CORS_ORIGIN
        value: https://miclub.cl,https://app.miclub.cl,https://comercio.miclub.cl,https://cajero.miclub.cl,https://admin.miclub.cl,https://carlosfuentes32.github.io
      - key: CUSTOMER_APP_URL
        value: https://app.miclub.cl
      - key: PILOT_BUSINESS_NAME
        value: Minimarket Piloto
      - key: PILOT_BUSINESS_SLUG
        value: minimarket-piloto
      - key: PILOT_OWNER_EMAIL
        value: owner@miclub.local
      - key: PILOT_CASHIER_EMAIL
        value: cashier@miclub.local
      - key: PILOT_CUSTOMER_EMAIL
        value: customer@miclub.local
      - key: PILOT_PROGRAM_TARGET
        value: 10
      - key: PILOT_PROGRAM_REWARD
        value: $5.000 de descuento en la próxima compra
