databases:
  - name: miclub-db
    databaseName: miclub
    user: miclub

services:
  - type: web
    name: miclub-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    preDeployCommand: npm run prisma:migrate:deploy && npm run prisma:seed
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: miclub-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN_DAYS
        value: 7
      - key: SEED_PASSWORD
        value: MiClubDemo2026!
      - key: SEED_ADMIN_EMAIL
        value: admin@miclub.local
      - key: CORS_ORIGIN
        value: https://carlosfuentes32.github.io
      - key: CUSTOMER_APP_URL
        value: https://carlosfuentes32.github.io/miclub-chile/customer
