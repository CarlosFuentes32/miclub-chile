name: Deploy MiClub web apps to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
env:
  VITE_API_URL: ${{ vars.VITE_API_URL }}
  VITE_CUSTOMER_URL: https://carlosfuentes32.github.io/miclub-chile/customer/
  VITE_COMMERCE_URL: https://carlosfuentes32.github.io/miclub-chile/commerce/
  VITE_CASHIER_URL: https://carlosfuentes32.github.io/miclub-chile/cashier/
  VITE_ADMIN_URL: https://carlosfuentes32.github.io/miclub-chile/admin/
jobs:
  e2e-staging:
    uses: ./.github/workflows/e2e-staging.yml
    secrets: inherit
  build:
    runs-on: ubuntu-latest
    needs: e2e-staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build landing
        run: npm run build --workspace=@miclub/landing
      - name: Build customer
        run: VITE_BASE_PATH=/miclub-chile/customer/ npm run build --workspace=@miclub/customer
      - name: Build commerce
        run: VITE_BASE_PATH=/miclub-chile/commerce/ npm run build --workspace=@miclub/commerce
      - name: Build cashier
        run: VITE_BASE_PATH=/miclub-chile/cashier/ npm run build --workspace=@miclub/cashier
      - name: Build admin
        run: VITE_BASE_PATH=/miclub-chile/admin/ npm run build --workspace=@miclub/admin
      - name: Assemble Pages artifact
        run: |
          mkdir -p public/customer public/commerce public/cashier public/admin
          cp -R apps/landing/dist/. public/
          cp -R apps/customer/dist/. public/customer/
          cp -R apps/commerce/dist/. public/commerce/
          cp -R apps/cashier/dist/. public/cashier/
          cp -R apps/admin/dist/. public/admin/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
