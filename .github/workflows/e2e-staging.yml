name: E2E Staging

on:
  pull_request:
    branches: [main, staging, develop]
  push:
    branches: [main, staging, develop]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: e2e-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright critical flows
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      E2E_ENV: staging
      E2E_API_URL: ${{ secrets.E2E_API_URL }}
      E2E_ADMIN_URL: ${{ secrets.E2E_ADMIN_URL }}
      E2E_COMMERCE_URL: ${{ secrets.E2E_COMMERCE_URL }}
      E2E_CASHIER_URL: ${{ secrets.E2E_CASHIER_URL }}
      E2E_CUSTOMER_URL: ${{ secrets.E2E_CUSTOMER_URL }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_DEFAULT_PASSWORD: ${{ secrets.E2E_DEFAULT_PASSWORD }}
      E2E_BILLING_WEBHOOK_SECRET: ${{ secrets.E2E_BILLING_WEBHOOK_SECRET }}
      E2E_VERCEL_BYPASS_SECRET: ${{ secrets.E2E_VERCEL_BYPASS_SECRET }}
      MONITORING_TOKEN: ${{ secrets.MONITORING_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://example:example@localhost:5432/miclub_staging_validation

      - name: Validate Prisma schema
        run: npx prisma validate --schema=database/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://example:example@localhost:5432/miclub_staging_validation

      - name: Build packages
        run: npm run build --workspaces --if-present

      - name: Run E2E suite against staging
        id: playwright
        run: npm run test:e2e:staging

      - name: Publish Playwright metadata to staging health
        if: always()
        run: |
          STATUS="${{ steps.playwright.outcome }}"
          if [ "$STATUS" = "success" ]; then RESULT="ok"; else RESULT="error"; fi
          PAYLOAD="{\"status\":\"$RESULT\",\"runId\":\"${{ github.run_id }}\",\"runUrl\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"commit\":\"${{ github.sha }}\",\"environment\":\"staging\",\"executedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error --max-time 15 \
              -X POST "$E2E_API_URL/monitoring/e2e-result" \
              -H "content-type: application/json" \
              -H "x-monitoring-token: $MONITORING_TOKEN" \
              -H "x-vercel-protection-bypass: $E2E_VERCEL_BYPASS_SECRET" \
              -d "$PAYLOAD"; then
              echo "Playwright metadata published on attempt $attempt"
              exit 0
            fi
            echo "Playwright metadata publish attempt $attempt failed; retrying in 10s"
            sleep 10
          done
          echo "::warning::Unable to publish Playwright metadata to staging health. Check MONITORING_TOKEN in GitHub Secrets and staging."
          exit 0

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright traces, screenshots and videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results
          if-no-files-found: ignore
          retention-days: 14
