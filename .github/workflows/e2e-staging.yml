name: E2E Staging

on:
  pull_request:
    branches: [main, staging, develop]
  push:
    branches: [main, staging, develop]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: e2e-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright critical flows
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      E2E_ENV: staging
      E2E_API_URL: ${{ secrets.E2E_API_URL }}
      E2E_ADMIN_URL: ${{ secrets.E2E_ADMIN_URL }}
      E2E_COMMERCE_URL: ${{ secrets.E2E_COMMERCE_URL }}
      E2E_CASHIER_URL: ${{ secrets.E2E_CASHIER_URL }}
      E2E_CUSTOMER_URL: ${{ secrets.E2E_CUSTOMER_URL }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_DEFAULT_PASSWORD: ${{ secrets.E2E_DEFAULT_PASSWORD }}
      E2E_BILLING_WEBHOOK_SECRET: ${{ secrets.E2E_BILLING_WEBHOOK_SECRET }}
      E2E_VERCEL_BYPASS_SECRET: ${{ secrets.E2E_VERCEL_BYPASS_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Validate Prisma schema
        run: npx prisma validate --schema=database/prisma/schema.prisma

      - name: Build packages
        run: npm run build --workspaces --if-present

      - name: Run E2E suite against staging
        run: npm run test:e2e:staging

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright traces, screenshots and videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results
          if-no-files-found: ignore
          retention-days: 14
